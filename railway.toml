[build]
builder = "railpack"
buildCommand = "cd frontend && npm ci && npm run build"

[deploy]
startCommand = "playwright install-deps chromium && playwright install chromium && alembic upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
